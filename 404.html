<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — CruiseRadar</title>
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0d1117;
    color:#e6edf3;
    font-family:'Syne',sans-serif;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
  }

  /* Animated radar rings */
  .radar {
    position:absolute;
    width:600px;
    height:600px;
    opacity:0.06;
    pointer-events:none;
  }
  .radar-ring {
    position:absolute;
    border-radius:50%;
    border:1px solid #00d4ff;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    animation:expand 4s ease-out infinite;
  }
  .radar-ring:nth-child(2) { animation-delay:1.3s; }
  .radar-ring:nth-child(3) { animation-delay:2.6s; }
  @keyframes expand {
    0%   { width:0; height:0; opacity:0.8; }
    100% { width:600px; height:600px; opacity:0; }
  }

  .content { position:relative; z-index:1; }

  .logo {
    display:inline-flex;
    align-items:flex-end;
    gap:6px;
    margin-bottom:48px;
    text-decoration:none;
  }
  .logo-text { font-size:24px; font-weight:800; letter-spacing:-0.8px; color:#e6edf3; line-height:1; }
  .logo-text span { color:#00d4ff; }
  .logo-beta { font-size:10px; font-weight:700; color:#00d4ff; letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; opacity:0.75; border:1px solid rgba(0,212,255,0.35); border-radius:3px; padding:1px 5px; line-height:1.4; }

  .error-code {
    font-family:'JetBrains Mono',monospace;
    font-size:96px;
    font-weight:700;
    color:#00d4ff;
    line-height:1;
    letter-spacing:-4px;
    margin-bottom:8px;
    opacity:0.15;
  }

  .ship-icon {
    font-size:52px;
    margin-bottom:20px;
    display:block;
    animation:drift 6s ease-in-out infinite;
  }
  @keyframes drift {
    0%,100% { transform:translateX(0) rotate(-2deg); }
    50%      { transform:translateX(12px) rotate(2deg); }
  }

  h1 {
    font-size:28px;
    font-weight:800;
    letter-spacing:-0.5px;
    margin-bottom:10px;
  }

  p {
    font-size:14px;
    color:#8b949e;
    font-family:'JetBrains Mono',monospace;
    margin-bottom:36px;
    line-height:1.6;
  }

  .btn {
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#00d4ff;
    color:#000;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.5px;
    padding:10px 22px;
    border-radius:6px;
    text-decoration:none;
    transition:opacity 0.15s;
  }
  .btn:hover { opacity:0.85; }

  .coords {
    margin-top:48px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:#484f58;
    letter-spacing:1px;
  }
</style>
</head>
<body>

<div class="radar">
  <div class="radar-ring"></div>
  <div class="radar-ring"></div>
  <div class="radar-ring"></div>
</div>

<div class="content">
  <a href="/" class="logo">
    <div class="logo-text">Cruise<span>Radar</span></div>
    <div class="logo-beta">beta</div>
  </a>

  <div class="error-code">404</div>
  <span class="ship-icon">🚢</span>

  <h1>Ship lost at sea</h1>
  <p>
    We couldn't find the page you were looking for.<br>
    It may have drifted off course.
  </p>

  <a href="/" class="btn">↩ Back to the tracker</a>

  <div class="coords">
    LAST KNOWN POSITION · UNKNOWN · SIGNAL LOST
  </div>
</div>

</body>
</html>
