<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0d1117"/>
  <!-- Radar circle rings -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.25"/>
  <circle cx="16" cy="16" r="8" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
  <!-- Ship triangle pointing up-right -->
  <polygon points="16,6 22,22 16,18 10,22" fill="#00d4ff" opacity="0.95"/>
  <!-- Radar sweep line -->
  <line x1="16" y1="16" x2="26" y2="8" stroke="#00ff9d" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="#00ff9d"/>
</svg>
